    </head>
    <body>
        <div class="react-container-root">

        </div>
        <script type="text/babel">
            const {
                colors,
                CssBaseline,
                ThemeProvider,
                Typography,
                Container,
                makeStyles,
                AppBar,
                Toolbar,
                IconButton,
                Icon,
                createMuiTheme,
                Box,
                SvgIcon,
                Link,
            } = MaterialUI;
            const theme = createMuiTheme({
                palette: {
                    primary: {
                        main: '#33aa33',
                    },
                    secondary: {
                        main: '#33ff33',
                    },
                    error: {
                        main: colors.red.A400,
                    },
                    background: {
                        default: '#fff',
                    },
                },
            });
            const useStyles = makeStyles(theme => ({
                root: {
                    margin: theme.spacing(6, 0, 3),
                }
            }));
            function HeaderNavBar() {
                return (
                    <AppBar position="fixed">
                        <Toolbar>
                            <Typography variant="h6">rk0cc</Typography>
                            <IconButton edge="end" aria-label="menu">
                                <Icon>menu</Icon>
                            </IconButton>
                        </Toolbar>
                    </AppBar>
                );
            }
            function App() {
                return (
                    <ThemeProvider theme={theme}>
                        {}
                        <CssBaseline/>
                        <React.Fragment>
                            <HeaderNavBar/>
                            <Container maxWidth="md">
                            </Container>
                        </React.Fragment>
                    </ThemeProvider>
                );
            }
            ReactDOM.render(<App/>,document.body.querySelector("div.react-container-root"));
        </script>
    </body>
